resources:
  jobs:
    sales_bronze:
      name: sales_bronze
      tasks:
        - task_key: Create_Bronze_Table
          notebook_task:
            notebook_path: ${var.notebooks_base_path}/Notebooks/bronze/10_Create_Bronze_Fact_Sales
            base_parameters:
              file_name: retail_sales_dataset
              extension: csv
              source_table: RetailSalesData
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
