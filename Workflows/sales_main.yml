resources:
  jobs:
    sales_main:
      name: sales_main
      tasks:
        - task_key: Bronze_Layer
          run_job_task:
            job_id: ${resources.jobs.sales_bronze.id}
        - task_key: Silver_Layer
          depends_on:
            - task_key: Bronze_Layer
          run_job_task:
            job_id: ${resources.jobs.sales_silver.id}
        - task_key: Gold_Layer
          depends_on:
            - task_key: Silver_Layer
          run_job_task:
            job_id: ${resources.jobs.sales_gold.id}
      queue:
        enabled: true
